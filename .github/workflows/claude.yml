name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write        # was: read — needed to push branches
      pull-requests: write   # was: read — needed for gh pr create
      issues: read
      id-token: write
      actions: read          # needed to read CI results on PRs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 1

      - name: Install build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends just
          cargo install mandown

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          claude_args: >-
            --allowedTools
            "Bash(cargo fmt *)"
            "Bash(cargo clippy *)"
            "Bash(cargo test *)"
            "Bash(cargo check *)"
            "Bash(cargo build *)"
            "Bash(cargo run *)"
            "Bash(just check)"
            "Bash(just man)"
            "Bash(git add *)"
            "Bash(git commit *)"
            "Bash(git diff *)"
            "Bash(git log *)"
            "Bash(git status)"
            "Bash(git show *)"
            "Bash(gh pr create *)"
            "Bash(gh pr edit *)"
            "Bash(gh pr view *)"
