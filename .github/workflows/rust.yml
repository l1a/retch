name: Rust

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip this job on version tags (full-test will run instead)
    if: github.ref_type != 'tag'

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  full-test:
    runs-on: ubuntu-latest
    # Only run on version tags pushed to main
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')

    strategy:
      matrix:
        container: 
          - ubuntu:latest
          - fedora:40

    container: ${{ matrix.container }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.container == 'ubuntu:latest'
      run: |
        apt-get update
        apt-get install -y pandoc

    - name: Install dependencies (Fedora)
      if: matrix.container == 'fedora:40'
      run: |
        dnf install -y pandoc

    - name: Build (release)
      run: cargo build --release --verbose

    - name: Run tests (all features)
      run: cargo test --all-features --verbose

    - name: Clippy
      run: cargo clippy -- -D warnings

    - name: Format check
      run: cargo fmt -- --check

    - name: Generate man page
      run: just man || echo "Man page generation skipped (just may not be installed)"
