name: Rust

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    # Skip this job on version tags (full-test will run instead)
    if: github.ref_type != 'tag'

    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: cargo build --verbose
    - name: Run tests
      run: cargo test --verbose

  full-test:
    runs-on: ubuntu-latest
    # Only run on version tags pushed to main
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')

    strategy:
      matrix:
        container: 
          - ubuntu:latest
          - fedora:40

    container: ${{ matrix.container }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Ubuntu)
      if: matrix.container == 'ubuntu:latest'
      run: |
        apt-get update
        apt-get install -y pandoc

    - name: Install dependencies (Fedora)
      if: matrix.container == 'fedora:40'
      run: |
        dnf install -y pandoc

    - name: Build (release)
      run: cargo build --release --verbose

    - name: Run tests (all features)
      run: cargo test --all-features --verbose

    - name: Clippy
      run: cargo clippy -- -D warnings

    - name: Format check
      run: cargo fmt -- --check

    - name: Generate man page
      run: just man || echo "Man page generation skipped (just may not be installed)"

  release:
    needs: full-test
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: cargo build --release

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp target/release/retch release/
          cp docs/retch.1 release/ || true
          tar -czvf release/retch-source.tar.gz --exclude='.git' .

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            release/retch
            release/retch.1
            release/retch-source.tar.gz
          generate_release_notes: true
