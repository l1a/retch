          fail-on-alert: true
          comment-on-alert: true
          alert-comment-cc-users: '@l1a'
          max-items-in-chart: 50

  benchmark-windows-x64:
    name: Benchmark Windows x64
    needs: benchmark-macos-x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install fastfetch and hyperfine
        run: |
          choco install fastfetch -y
          python scripts/install_hyperfine.py

      - name: Build release binary
        run: cargo build --release

      - name: Run benchmarks
        run: |
          cargo bench
          hyperfine --warmup 3 --runs 10 '.\target\release\retch.exe' 'fastfetch' --export-json hyperfine_result.json
          python scripts/parse_criterion.py

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
