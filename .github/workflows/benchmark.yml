name: Continuous Benchmarking

on:
  push:
    branches: [ "feature/multi-platform-benchmarks" ]

permissions:
  contents: write
  deployments: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark-linux-x64:
    name: Benchmark Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install fastfetch and hyperfine
        run: |
          sudo apt-get update && sudo apt-get install -y hyperfine
          wget https://github.com/fastfetch-cli/fastfetch/releases/latest/download/fastfetch-linux-amd64.deb
          sudo dpkg -i fastfetch-linux-amd64.deb || sudo apt-get install -f -y

      - name: Build release binary
        run: cargo build --release

      - name: Run benchmarks
        run: |
          cargo bench
          hyperfine --warmup 3 --runs 10 './target/release/retch' 'fastfetch' --export-json hyperfine_result.json
          python3 scripts/parse_criterion.py

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Linux x64 Benchmarks"
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark_result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: '200%'
          fail-on-alert: true
          comment-on-alert: true
          alert-comment-cc-users: '@l1a'
          max-items-in-chart: 50

  benchmark-linux-arm:
    name: Benchmark Linux arm64
    needs: benchmark-linux-x64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install fastfetch and hyperfine
        run: |
          sudo apt-get update && sudo apt-get install -y hyperfine
          wget https://github.com/fastfetch-cli/fastfetch/releases/latest/download/fastfetch-linux-aarch64.deb
          sudo dpkg -i fastfetch-linux-aarch64.deb || sudo apt-get install -f -y

      - name: Build release binary
        run: cargo build --release

      - name: Run benchmarks
        run: |
          cargo bench
          hyperfine --warmup 3 --runs 10 './target/release/retch' 'fastfetch' --export-json hyperfine_result.json
          python3 scripts/parse_criterion.py

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "Linux Arm64 Benchmarks"
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark_result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          gh-pages-branch: gh-pages
          benchmark-data-dir-path: dev/bench
          alert-threshold: '200%'
          fail-on-alert: true
          comment-on-alert: true
          alert-comment-cc-users: '@l1a'
          max-items-in-chart: 50

  benchmark-macos-arm:
    name: Benchmark macOS arm64
    needs: benchmark-linux-arm
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install fastfetch and hyperfine
        run: |
          brew install fastfetch
          python3 scripts/install_hyperfine.py

      - name: Build release binary
