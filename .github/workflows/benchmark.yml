      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: "macOS x64 Benchmarks"
          tool: 'customSmallerIsBetter'
          output-file-path: benchmark_result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
